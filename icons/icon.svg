<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#d35400"/>
    </radialGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2b2b2b"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#ring)" stroke-width="4"/>
  <!-- Fan blades -->
  <g transform="translate(32,32)" fill="#e67e22" opacity="0.9">
    <ellipse cx="0" cy="-12" rx="4" ry="10" transform="rotate(0)"/>
    <ellipse cx="0" cy="-12" rx="4" ry="10" transform="rotate(120)"/>
    <ellipse cx="0" cy="-12" rx="4" ry="10" transform="rotate(240)"/>
  </g>
  <!-- Center hub -->
  <circle cx="32" cy="32" r="8" fill="url(#center)" stroke="#e67e22" stroke-width="2"/>
  <!-- LED dots on ring -->
  <g fill="#e67e22">
    <circle cx="32" cy="4" r="2"/>
    <circle cx="48" cy="12" r="2"/>
    <circle cx="56" cy="32" r="2"/>
    <circle cx="48" cy="52" r="2"/>
    <circle cx="32" cy="60" r="2"/>
    <circle cx="16" cy="52" r="2"/>
    <circle cx="8" cy="32" r="2"/>
    <circle cx="16" cy="12" r="2"/>
  </g>
</svg>
